# Tag-driven release notes for the substrate.
#
# On every ``v*`` tag push, generate a GitHub release with notes lifted
# from CHANGELOG.md. Satellites pin to a specific tag — releases serve
# as the contract record for what changed between pins.

name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog entry for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "Tag: $TAG" >&2
          # Pull the section from CHANGELOG.md between this version and the
          # next "## " header.
          awk -v tag="$TAG" '
            $0 ~ "^## \\["tag"\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          if [[ ! -s release_notes.md ]]; then
            echo "No changelog entry for $TAG" > release_notes.md
          fi

      - name: Create or update GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          # Idempotent: if release was already created manually (e.g., via
          # gh release create at tag-push time), update its notes instead
          # of failing. Pre-release variants (v*a*, v*b*, v*rc*) get the
          # --prerelease flag.
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ a[0-9]+$|b[0-9]+$|rc[0-9]+$ ]]; then
              PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG exists — updating notes only"
              gh release edit "$TAG" --notes-file release_notes.md
          else
              echo "Creating release $TAG"
              # shellcheck disable=SC2086
              gh release create "$TAG" $PRERELEASE_FLAG \
                  --title "$TAG" \
                  --notes-file release_notes.md
          fi
